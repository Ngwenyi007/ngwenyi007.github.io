<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌸 Mother's Day Celebration 🌸</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

<style>
    body{
        margin:0;
        font-family: system-ui, sans-serif;
        background: linear-gradient(135deg,#ffd6e7,#ffc2d1);
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        padding:20px;
    }

    .card{
        background:white;
        width:100%;
        max-width:500px;
        padding:30px;
        border-radius:25px;
        text-align:center;
        box-shadow:0 10px 40px rgba(0,0,0,0.15);
    }

    h1{
        color:#d63384;
        margin-bottom:10px;
    }

    p{
        color:#444;
        font-size:14px;
        margin-bottom:20px;
    }

    input{
        width:100%;
        padding:14px;
        border-radius:12px;
        border:2px solid #eee;
        font-size:16px;
        outline:none;
        margin-top:10px;
    }

    input:focus{
        border-color:#d63384;
    }

    button{
        margin-top:15px;
        width:100%;
        padding:14px;
        border:none;
        border-radius:12px;
        background:#d63384;
        color:white;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        background:#b0256d;
    }

    .hidden{
        display:none;
    }

    .message{
        margin-top:20px;
        font-size:18px;
        color:#333;
    }

    .big{
        font-size:28px;
    }

</style>
</head>

<body>

<div class="card">

    <div id="start">
        <h1>🌸 Mother's Day Portal 🌸</h1>
        <p>Enter your mother title to enter the celebration 👑</p>

        <input id="name" placeholder="e.g. Mama John" />

        <button onclick="enter()">Enter Celebration 💖</button>

        <p style="margin-top:10px; font-size:12px;">
            Only “Mama / Mom / Mother + Name” allowed
        </p>
    </div>

    <div id="celebration" class="hidden">
        <div class="big">🎉 Welcome 🎉</div>
        <div class="message" id="msg"></div>

        <p style="margin-top:15px;">
            You are loved beyond words 🌸💖
        </p>
    </div>

</div>

<script>
function enter(){
    const name = document.getElementById("name").value.trim();
    const msg = document.getElementById("msg");

    if(name.length < 5){
        alert("Please enter a valid mother title 🌸");
        return;
    }

    const valid =
        /^mama\s+[a-zA-Z]+$/i.test(name) ||
        /^mom\s+[a-zA-Z]+$/i.test(name) ||
        /^mother\s+[a-zA-Z]+$/i.test(name);

    if(!valid){
        alert("Only Mama/Mom/Mother + Name allowed 👑");
        return;
    }

    document.getElementById("start").classList.add("hidden");
    document.getElementById("celebration").classList.remove("hidden");

    msg.innerHTML = `💖 Hello <b>${name}</b> 💖<br>Today is your day to shine like the queen you are 👑`;

    confetti({
        particleCount: 250,
        spread: 90,
        origin: { y: 0.6 }
    });

    // extra celebration burst
    setTimeout(()=>{
        confetti({ particleCount: 150, spread: 120 });
    }, 600);
}
</script>

</body>
</html>
