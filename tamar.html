<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>✨ Behlly Tamar · Blazing Birthday Magic ✨</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* keeps it slick, no accidental text-selection distractions */
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
      overflow-x: hidden;
      position: relative;
      cursor: crosshair;
    }

    /* main card — dynamic glassmorphism with reactive glow */
    .birthday-universe {
      position: relative;
      width: 90%;
      max-width: 780px;
      margin: 2rem auto;
      perspective: 1200px;
    }

    .core-card {
      background: rgba(20, 25, 45, 0.45);
      backdrop-filter: blur(16px) saturate(180%);
      border-radius: 64px;
      border: 1px solid rgba(255, 215, 150, 0.4);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 210, 90, 0.2) inset, 0 0 30px rgba(255, 100, 150, 0.2);
      padding: 2rem 2rem 2.6rem;
      text-align: center;
      transition: all 0.2s ease;
      animation: floatGlow 3s infinite alternate ease-in-out;
    }

    @keyframes floatGlow {
      0% {
        transform: translateY(0px);
        box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 215, 150, 0.3) inset, 0 0 20px rgba(255, 100, 150, 0.2);
      }
      100% {
        transform: translateY(-8px);
        box-shadow: 0 40px 60px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 220, 130, 0.6) inset, 0 0 45px rgba(255, 120, 180, 0.5);
      }
    }

    /* dynamic name burst */
    .dynamic-name {
      font-size: clamp(2.6rem, 12vw, 5.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, #FFDAA6, #FFA07A, #FF6A88, #F9C9B6);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmerMove 5s ease infinite, textPop 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
      letter-spacing: -0.02em;
      text-shadow: 0 0 15px rgba(255, 160, 100, 0.4);
      margin-bottom: 0.25rem;
    }

    @keyframes shimmerMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes textPop {
      0% { transform: scale(0.92); opacity: 0; letter-spacing: -0.08em; filter: blur(2px);}
      100% { transform: scale(1); opacity: 1; letter-spacing: -0.02em; filter: blur(0);}
    }

    .greeting-headline {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 500;
      color: #FFEFD0;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
      margin: 0.5rem 0 0.25rem;
      letter-spacing: -0.2px;
      background: linear-gradient(120deg, #fff2df, #ffdbb5);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 600;
    }

    /* dynamic countdown / age reveal with realtime flair */
    .dynamic-clock {
      margin: 1.2rem 0;
      font-size: 1.1rem;
      font-weight: 500;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      display: inline-block;
      padding: 0.5rem 1.4rem;
      border-radius: 60px;
      color: #ffeaC8;
      border: 1px solid rgba(255, 200, 130, 0.5);
      font-family: monospace;
      letter-spacing: 0.5px;
    }

    .dynamic-clock span {
      font-weight: 700;
      color: #FFBF7A;
      font-size: 1.2rem;
    }

    /* inspirational quote carousel (blazing / dynamic) */
    .quote-zone {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 48px;
      padding: 1rem 1.2rem;
      margin: 1.8rem 0;
      transition: all 0.2s;
      border-left: 3px solid #FFB347;
      border-right: 3px solid #FF8A5C;
    }

    .quote-text {
      font-size: 1.2rem;
      font-weight: 500;
      color: #FFECD6;
      line-height: 1.4;
      transition: opacity 0.25s ease;
      min-height: 5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.5rem;
    }

    .quote-author {
      font-size: 0.85rem;
      opacity: 0.8;
      letter-spacing: 1px;
      color: #ffcb8e;
    }

    /* blazing interactive button & particle response */
    .blazing-btn {
      background: linear-gradient(95deg, #FF4D6D, #FF8C42);
      border: none;
      padding: 0.9rem 2rem;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 60px;
      color: white;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 1.2, 0.8, 1);
      box-shadow: 0 0 12px rgba(255, 70, 100, 0.6);
      margin-top: 0.6rem;
      width: 100%;
      max-width: 260px;
      letter-spacing: 1px;
      backdrop-filter: blur(4px);
    }

    .blazing-btn:active {
      transform: scale(0.96);
      background: linear-gradient(95deg, #FF2E55, #FF6A2E);
      box-shadow: 0 0 25px rgba(255, 50, 80, 0.9);
    }

    /* floating animation particles canvas */
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .footer-note {
      margin-top: 1.4rem;
      font-size: 0.75rem;
      color: #c0b9a8;
      opacity: 0.7;
    }

    /* confetti layer (dynamic js trigger) */
    .confetti-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 200;
    }

    @media (max-width: 560px) {
      .core-card {
        padding: 1.6rem;
        border-radius: 48px;
      }
      .quote-text {
        font-size: 1rem;
      }
      .blazing-btn {
        font-size: 1rem;
        padding: 0.7rem 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- background canvas for dynamic particle system (blazing sparkles that follow cursor & burst) -->
  <canvas id="particle-canvas"></canvas>
  <div class="confetti-layer" id="confetti-layer"></div>

  <div class="birthday-universe">
    <div class="core-card">
      <!-- explosive dynamic name + headline -->
      <div class="dynamic-name" id="behllyName">✨ Behlly Tamar ✨</div>
      <div class="greeting-headline" id="mainGreeting">⚡Happy Birthday, Blazing star⚡</div>
      
      <!-- live ticking age & birthday countdown: dynamic with real date (current year birthday context) -->
      <div class="dynamic-clock" id="liveClockDisplay">
        🎂 <span id="ageValue">--</span> years · today is YOUR cosmic day 🎈
      </div>
      
      <!-- quote rotator that changes with heartbeat effect -->
      <div class="quote-zone">
        <div class="quote-text" id="dynamicQuote">
          <span id="quoteContent">"Love is the closest thing we have to magic."</span>
          <span class="quote-author" id="quoteAuthor">— the universe for you</span>
        </div>
      </div>
      
      <!-- blazing action button: triggers firework + confetti + updates quote magic & dynamic energy -->
      <button class="blazing-btn" id="birthdayBlaster">💥 IGNITE BIRTHDAY MAGIC 💥</button>
      <div class="footer-note">
        🌟 every tap = more love, more sparkles, more Tamar magic
      </div>
    </div>
  </div>

  <script>
    // --------------------------------------------------------------
    // DYNAMIC BLAZING BIRTHDAY PAGE FOR BEHLLY TAMAR
    // Includes: live age counter, quote carousel, advanced confetti, 
    // particle system following mouse/touch, background glitter
    // --------------------------------------------------------------
    
    // BEHLLY TAMAR’s birth date: (assuming 5th May – you can change easily)
    // Using May 5 as her special day; if actual is different, modify below (month 0-index)
    const BIRTH_DATE = { year: 2006, month: 4, day: 5 };  // May 5 => month = 4 (0-index)
    // but to compute age dynamically based on current date, and also to show next bday countdown
    // For "birthday mode", if today is May 5, it shows grand celebration age+1
    
    function getAgeAndStatus() {
      const today = new Date();
      const birthThisYear = new Date(today.getFullYear(), BIRTH_DATE.month, BIRTH_DATE.day);
      let age = today.getFullYear() - BIRTH_DATE.year;
      const hasHadBirthdayThisYear = (today > birthThisYear);
      if (!hasHadBirthdayThisYear) age--;
      let isExactlyBirthday = (today.getDate() === BIRTH_DATE.day && today.getMonth() === BIRTH_DATE.month);
      return { age, isExactlyBirthday, today };
    }
    
    // update age span and extra festive message
    function updateDynamicAge() {
      const { age, isExactlyBirthday, today } = getAgeAndStatus();
      const ageSpan = document.getElementById('ageValue');
      if (ageSpan) {
        if (isExactlyBirthday) {
          ageSpan.innerHTML = `${age} ✨✨`;
          const clockDiv = document.getElementById('liveClockDisplay');
          if (clockDiv) clockDiv.style.background = "rgba(255, 100, 80, 0.6)";
        } else {
          ageSpan.innerHTML = age;
        }
      }
      // also optional countdown to next birthday
      const nextBirthday = new Date(today.getFullYear(), BIRTH_DATE.month, BIRTH_DATE.day);
      if (today > nextBirthday) nextBirthday.setFullYear(today.getFullYear() + 1);
      const diffDays = Math.ceil((nextBirthday - today) / (1000 * 60 * 60 * 24));
      const clockSpanParent = document.getElementById('liveClockDisplay');
      if (!isExactlyBirthday && clockSpanParent) {
        clockSpanParent.innerHTML = `🎂 <span id="ageValue">${age}</span> years · next orbit in ${diffDays} days 🎈`;
        // reattach span reference after innerHTML replacement
        const newAgeSpan = document.getElementById('ageValue');
        if (newAgeSpan && newAgeSpan.innerText != age) newAgeSpan.innerText = age;
      } else if (isExactlyBirthday && clockSpanParent) {
        clockSpanParent.innerHTML = `🎉🎂 <span id="ageValue">${age} 🎂</span> · TODAY IS YOUR BLAZING DAY! 🎉🎈`;
      }
    }
    
    // ----- QUOTE DATABASE (dynamic messages for Behlly Tamar, love & fire) -----
    const quoteLibrary = [
      { text: "You set my world on fire in the best possible way — Happy Birthday, Behlly Tamar.", author: "— your universe" },
      { text: "Every day with you is a spark, but today? Today is a supernova.", author: "🔥 for Tamar" },
      { text: "Your smile rewires my gravity. Happy birthday to the girl who makes ordinary feel electric.", author: "— madly yours" },
      { text: "Behlly, you are the melody that makes chaos become symphony. Keep shining, birthday queen.", author: "✨ soul note" },
      { text: "To the most magnetic soul I know: may your year be as dazzling as your heart.", author: "💖 forever fan" },
      { text: "You + birthday + starlight = infinite magic. Let's paint the sky with dreams.", author: "Behlly's flame" },
      { text: "Another revolution around the sun, and I'm still grateful you exist. Happy Birthday, my favorite person.", author: "— love, me" },
      { text: "Radiant, fearless, beautiful Behlly Tamar. Today the whole world celebrates YOU.", author: "🌹⭐" }
    ];
    
    let currentQuoteIndex = 0;
    const quoteTextSpan = document.getElementById('quoteContent');
    const quoteAuthorSpan = document.getElementById('quoteAuthor');
    
    function updateQuoteRandom() {
      // pick random, but avoid repeat if possible for dynamic feel
      let newIndex = Math.floor(Math.random() * quoteLibrary.length);
      while (newIndex === currentQuoteIndex && quoteLibrary.length > 1) {
        newIndex = Math.floor(Math.random() * quoteLibrary.length);
      }
      currentQuoteIndex = newIndex;
      const q = quoteLibrary[currentQuoteIndex];
      if (quoteTextSpan && quoteAuthorSpan) {
        quoteTextSpan.style.opacity = '0';
        setTimeout(() => {
          quoteTextSpan.innerText = `“${q.text}”`;
          quoteAuthorSpan.innerText = q.author;
          quoteTextSpan.style.opacity = '1';
        }, 80);
      }
    }
    
    // next quote in carousel but random effect for blaze
    function blazeNewQuote() {
      updateQuoteRandom();
      // fire micro vibration if supported
      if (navigator.vibrate) navigator.vibrate(50);
    }
    
    // ---------- CONFETTI BURST (blazing dynamic canvas confetti) ----------
    function launchHeavyConfetti() {
      const confettiContainer = document.getElementById('confetti-layer');
      // Use canvas confetti from popular library? but we implement custom blazing paper bits.
      // We'll create dynamic div confetti + canvas classic using requestAnimationFrame? easier: use vanilla JS confetti via canvas injection.
      // For blazing performance & compatibility, I'll add an embedded Canvas confetti system.
      // we will create a canvas element on top, then burst confetti.
      let canvasConf = document.createElement('canvas');
      canvasConf.style.position = 'fixed';
      canvasConf.style.top = '0';
      canvasConf.style.left = '0';
      canvasConf.style.width = '100%';
      canvasConf.style.height = '100%';
      canvasConf.style.pointerEvents = 'none';
      canvasConf.style.zIndex = '999';
      document.body.appendChild(canvasConf);
      const ctx = canvasConf.getContext('2d');
      canvasConf.width = window.innerWidth;
      canvasConf.height = window.innerHeight;
      
      let particles = [];
      const colors = ['#FF5E7E', '#FFB347', '#FF6A88', '#FAC05E', '#FF95A8', '#E56B6F', '#FFC68A', '#FFD966', '#FF9F4A'];
      for (let i = 0; i < 180; i++) {
        particles.push({
          x: Math.random() * canvasConf.width,
          y: Math.random() * canvasConf.height - canvasConf.height,
          size: Math.random() * 6 + 3,
          speedY: Math.random() * 8 + 5,
          speedX: (Math.random() - 0.5) * 5,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 12
        });
      }
      
      let animationId;
      let startTime = performance.now();
      function animateConfetti(now) {
        if (!canvasConf || !canvasConf.parentNode) return;
        ctx.clearRect(0, 0, canvasConf.width, canvasConf.height);
        let allDead = true;
        for (let p of particles) {
          p.y += p.speedY;
          p.x += p.speedX;
          p.rotation += p.rotSpeed;
          if (p.y < canvasConf.height + 50) allDead = false;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation * Math.PI / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
          ctx.restore();
        }
        if (allDead || (performance.now() - startTime > 3200)) {
          cancelAnimationFrame(animationId);
          if(canvasConf && canvasConf.remove) canvasConf.remove();
        } else {
          animationId = requestAnimationFrame(animateConfetti);
        }
      }
      animationId = requestAnimationFrame(animateConfetti);
      setTimeout(() => {
        if(canvasConf && canvasConf.remove) canvasConf.remove();
        if(animationId) cancelAnimationFrame(animationId);
      }, 3600);
    }
    
    // 2nd confetti variant + extra sparkles with DOM particles for more "blazing"
    function superBlast() {
      launchHeavyConfetti();
      // additional dynamic DOM glitter
      for(let i=0;i<60;i++) {
        let glitter = document.createElement('div');
        glitter.innerHTML = ['✨','💥','🎆','🔥','⭐','💖','🎂','💫'][Math.floor(Math.random()*8)];
        glitter.style.position = 'fixed';
        glitter.style.left = Math.random() * window.innerWidth + 'px';
        glitter.style.top = '-20px';
        glitter.style.fontSize = (Math.random() * 20 + 18) + 'px';
        glitter.style.pointerEvents = 'none';
        glitter.style.zIndex = '1000';
        glitter.style.opacity = '0.9';
        glitter.style.transition = 'transform 1.2s ease-out, opacity 1s';
        document.body.appendChild(glitter);
        let finalX = (Math.random() - 0.5) * 300;
        setTimeout(() => {
          glitter.style.transform = `translate(${finalX}px, ${window.innerHeight+40}px) rotate(${Math.random()*360}deg)`;
          glitter.style.opacity = '0';
        }, 10);
        setTimeout(() => glitter.remove(), 1400);
      }
      // update quote also
      blazeNewQuote();
      // also change main greeting variation dynamically on blast
      const greetElem = document.getElementById('mainGreeting');
      const blazingTitles = [
        "⚡ HAPPY BIRTHDAY BEHLLY TAMAR ⚡",
        "💖 BLAZING WITH LOVE FOR YOU 💖",
        "🎆 THE UNIVERSE BOWS TO YOU TODAY 🎆",
        "🔥 BEHLLY TAMAR · QUEEN OF FLAMES 🔥",
        "✨ YOU'RE THE SUPERNOVA IN MY SKY ✨"
      ];
      const randomGreet = blazingTitles[Math.floor(Math.random() * blazingTitles.length)];
      greetElem.style.transition = "all 0.2s";
      greetElem.style.opacity = "0";
      setTimeout(() => {
        greetElem.innerText = randomGreet;
        greetElem.style.opacity = "1";
      }, 100);
      // also pulse name gradient
      const nameEl = document.getElementById('behllyName');
      nameEl.style.transform = "scale(1.03)";
      setTimeout(() => nameEl.style.transform = "scale(1)", 200);
    }
    
    // -------------------- BLAZING PARTICLE SYSTEM (dynamic mouse / touch) --------------------
    const canvas = document.getElementById('particle-canvas');
    let ctxPart = canvas.getContext('2d');
    let particlesArray = [];
    let mouseX = null, mouseY = null;
    let width = window.innerWidth, height = window.innerHeight;
    
    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    
    class Spark {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 5 + 2;
        this.speedX = (Math.random() - 0.5) * 2.4;
        this.speedY = (Math.random() - 0.5) * 2.4 - 1.2;
        this.color = `hsl(${Math.random() * 30 + 15}, 85%, 65%)`;
        this.life = 0.95;
        this.maxLife = 0.95;
        this.alpha = 1;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life -= 0.015;
        this.alpha = this.life / this.maxLife;
        return this.life > 0;
      }
      draw(context) {
        context.save();
        context.globalAlpha = this.alpha * 0.9;
        context.fillStyle = this.color;
        context.shadowBlur = 8;
        context.shadowColor = "#FFAA66";
        context.beginPath();
        context.arc(this.x, this.y, this.size * (this.life + 0.2), 0, Math.PI * 2);
        context.fill();
        context.restore();
      }
    }
    
    function addSparklesFromPoint(x, y, count = 9) {
      for (let i = 0; i < count; i++) {
        particlesArray.push(new Spark(x, y));
      }
      while (particlesArray.length > 220) particlesArray.shift();
    }
    
    function animateParticles() {
      if (!ctxPart) return;
      ctxPart.clearRect(0, 0, width, height);
      for (let i = particlesArray.length-1; i >= 0; i--) {
        let p = particlesArray[i];
        let alive = p.update();
        p.draw(ctxPart);
        if (!alive) particlesArray.splice(i,1);
      }
      if (mouseX !== null && mouseY !== null) {
        addSparklesFromPoint(mouseX, mouseY, 3);
      }
      requestAnimationFrame(animateParticles);
    }
    
    function onMove(e) {
      const rect = canvas.getBoundingClientRect();
      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      mouseX = clientX;
      mouseY = clientY;
      // burst additional
      addSparklesFromPoint(mouseX, mouseY, 2);
    }
    
    window.addEventListener('resize', () => {
      resizeCanvas();
    });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove);
    window.addEventListener('touchstart', onMove);
    
    resizeCanvas();
    animateParticles();
    
    // every 4 seconds rotate quote for dynamic feel (without button)
    setInterval(() => {
      if (document.hasFocus()) {
        updateQuoteRandom();
      }
    }, 7000);
    
    // Button click -> super blast + dynamic age double-check + extra stars
    const blastBtn = document.getElementById('birthdayBlaster');
    blastBtn.addEventListener('click', (e) => {
      e.preventDefault();
      superBlast();
      updateDynamicAge();      // refresh just in case
      // add extra floating heart around button
      for(let i=0;i<12;i++) {
        let heart = document.createElement('div');
        heart.innerHTML = '❤️‍🔥';
        heart.style.position = 'fixed';
        heart.style.left = (e.clientX - 15 + (Math.random() - 0.5)*80) + 'px';
        heart.style.top = (e.clientY - 20) + 'px';
        heart.style.fontSize = '24px';
        heart.style.pointerEvents = 'none';
        heart.style.zIndex = '2000';
        heart.style.transition = 'all 0.7s ease-out';
        heart.style.opacity = '1';
        document.body.appendChild(heart);
        setTimeout(() => {
          heart.style.transform = `translateY(${-80 + Math.random() * -70}px) translateX(${(Math.random() - 0.5)*70}px)`;
          heart.style.opacity = '0';
        }, 10);
        setTimeout(() => heart.remove(), 800);
      }
    });
    
    // initial age & countdown
    updateDynamicAge();
    updateQuoteRandom();
    
    // Make header sparkling every 3 sec
    setInterval(() => {
      const nameDiv = document.getElementById('behllyName');
      nameDiv.style.textShadow = "0 0 12px #FFA559, 0 0 18px #FF6F61";
      setTimeout(()=> nameDiv.style.textShadow = "0 0 15px rgba(255, 160, 100, 0.4)", 400);
    }, 2800);
    
    // double initial particle love
    for(let i=0;i<30;i++) {
      setTimeout(()=> {
        if(mouseX && mouseY) addSparklesFromPoint(mouseX, mouseY, 4);
        else addSparklesFromPoint(width/2, height/2, 4);
      }, i*80);
    }
    
    console.log("🔥 BLAZING BIRTHDAY FOR BEHLLY TAMAR 🔥");
  </script>
</body>
</html>
