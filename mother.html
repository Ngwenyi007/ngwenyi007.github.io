<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mothers Celebration Portal 🌸</title>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#ffd6e7,#ffc2d1);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      overflow-x:hidden;
    }

    .container{
      width:100%;
      max-width:850px;
      background:white;
      border-radius:25px;
      padding:35px;
      box-shadow:0 10px 40px rgba(0,0,0,0.15);
      text-align:center;
    }

    h1{
      color:#d63384;
      margin-bottom:15px;
      font-size:2.5rem;
    }

    p{
      color:#444;
      margin-bottom:20px;
      line-height:1.6;
    }

    input{
      width:100%;
      padding:15px;
      border-radius:12px;
      border:2px solid #eee;
      margin-top:15px;
      font-size:1rem;
      outline:none;
    }

    input:focus{
      border-color:#d63384;
    }

    button{
      margin-top:20px;
      padding:15px 25px;
      border:none;
      border-radius:12px;
      background:#d63384;
      color:white;
      font-size:1rem;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    button:hover{
      background:#b0256d;
      transform:scale(1.05);
    }

    .hidden{
      display:none;
    }

    .mothers-wall{
      margin-top:30px;
      background:#fff0f5;
      border-radius:20px;
      padding:20px;
      max-height:350px;
      overflow-y:auto;
      text-align:left;
    }

    .mother-card{
      background:white;
      padding:15px;
      border-radius:12px;
      margin-bottom:12px;
      animation:fadeIn 0.5s ease;
      box-shadow:0 3px 10px rgba(0,0,0,0.08);
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .mother-name{
      font-weight:bold;
      color:#d63384;
      font-size:1.1rem;
    }

    .status{
      color:#555;
      margin-top:5px;
    }

    .time{
      font-size:0.8rem;
      color:#999;
      margin-top:8px;
    }

    .online-count{
      margin-top:20px;
      font-size:1.2rem;
      color:#b0256d;
      font-weight:bold;
    }

    .floating{
      position:fixed;
      bottom:-50px;
      animation:floatUp 10s linear infinite;
      color:#d63384;
      font-weight:bold;
      pointer-events:none;
      opacity:0.8;
    }

    @keyframes floatUp{
      from{
        transform:translateY(0);
        opacity:1;
      }
      to{
        transform:translateY(-120vh);
        opacity:0;
      }
    }

  </style>
</head>
<body>

<div class="container">

  <!-- ENTRY SCREEN -->
  <div id="entryScreen">

    <h1>🌸 Mothers Celebration Portal 👑</h1>

    <p>
      Welcome beautiful mothers.<br>
      Enter your mother title to celebrate with fellow queens today 💖
    </p>

    <input
      type="text"
      id="motherName"
      placeholder="Example: Mama Francis"
    />

    <input
      type="text"
      id="motherStatus"
      placeholder="How are you feeling today?"
    />

    <button onclick="joinCelebration()">
      Enter Celebration ✨
    </button>

  </div>

  <!-- MAIN SCREEN -->
  <div id="mainScreen" class="hidden">

    <h1>🌷 Mothers Celebrating Right Now 🌷</h1>

    <p>
      A digital gathering of appreciation, strength, and love 💖
    </p>

    <div class="online-count" id="onlineCount">
      Loading mothers...
    </div>

    <div class="mothers-wall" id="mothersWall">
    </div>

  </div>

</div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://fflpqfnvxmylaxcfdchs.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY_HERE";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function joinCelebration() {

  const name = document.getElementById("motherName").value.trim();
  const status = document.getElementById("motherStatus").value.trim();

  if (!name) {
    alert("Enter name");
    return;
  }

  const { data, error } = await supabaseClient
    .from("mothers")
    .insert([{ name, status }])
    .select();

  if (error) {
    alert("Insert failed");
    console.log(error);
    return;
  }

  alert("Success 🌸");
  loadMothers();
}

async function loadMothers() {

  const { data, error } = await supabaseClient
    .from("mothers")
    .select("*")
    .order("id", { ascending: false });

  if (error) {
    console.log(error);
    alert("Fetch failed");
    return;
  }

  const wall = document.getElementById("mothersWall");
  wall.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "mother-card";
    div.innerHTML = `
      <div class="mother-name">${m.name}</div>
      <div class="status">${m.status}</div>
    `;
    wall.appendChild(div);
  });
}

window.joinCelebration = joinCelebration;
window.loadMothers = loadMothers;

loadMothers();
</script>
</body>
</html>
