<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 Mothers Inspiration Wall · Working Version</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Arial, sans-serif;
    }
    body {
      background: linear-gradient(135deg, #ffd6e7, #ffc2d1);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      width: 100%;
      background: white;
      border-radius: 2rem;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }
    h1 { color: #d63384; margin-bottom: 1rem; }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: 2px solid #ffe2ec;
      border-radius: 60px;
      font-size: 1rem;
    }
    textarea { border-radius: 24px; resize: vertical; }
    button {
      margin-top: 20px;
      padding: 12px 28px;
      background: #d63384;
      color: white;
      border: none;
      border-radius: 60px;
      font-weight: bold;
      cursor: pointer;
    }
    .wall {
      background: #fff0f5;
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-top: 2rem;
      max-height: 400px;
      overflow-y: auto;
    }
    .card {
      background: white;
      padding: 1rem;
      border-radius: 1rem;
      margin-bottom: 1rem;
      border-left: 5px solid #f1a9c0;
    }
    .name { font-weight: bold; color: #d63384; }
    .status { margin-top: 6px; font-style: italic; }
    .time { font-size: 0.7rem; color: gray; margin-top: 8px; text-align: right; }
    .error-box {
      background: #ffe0e0;
      color: #c00;
      padding: 8px;
      border-radius: 12px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🌸 Mothers Inspiration Wall</h1>
  <p>Leave a message to inspire other mothers around the world 💖</p>

  <input type="text" id="motherName" placeholder="Your name (must include 'mama', 'mom', or 'mother')">
  <textarea id="motherMessage" rows="2" placeholder="Your message of hope, joy, or wisdom..."></textarea>
  <button id="postBtn">✨ Post to Wall ✨</button>

  <div id="wall" class="wall">
    <div style="text-align:center; padding:1rem;">Loading messages...</div>
  </div>
  <div style="margin-top: 1rem; font-size:0.7rem; color:#777;">❤️ Every mother’s voice shared here.</div>
</div>

<script>
  // ==================== YOUR SUPABASE CREDENTIALS ====================
  const SUPABASE_URL = "https://fflpqfnvxmylaxcfdchs.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmbHBxZm52eG15bGF4Y2ZkY2hzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzU3ODEsImV4cCI6MjA5MzkxMTc4MX0.JJA7jPfyvzgrbzKMbtJZdIoAMY7Wj0Tc3Y_cRmpG6EU";
  // ====================================================================

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Helper: show error in the wall area
  function showError(msg) {
    const wallDiv = document.getElementById('wall');
    wallDiv.innerHTML = `<div class="error-box">⚠️ ${msg}</div>${wallDiv.innerHTML}`;
    console.error(msg);
  }

  // Load all messages (newest first)
  async function loadMessages() {
    const { data, error } = await supabase
      .from('mothers')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      showError('Failed to load: ' + error.message);
      return;
    }

    const wallDiv = document.getElementById('wall');
    if (!data || data.length === 0) {
      wallDiv.innerHTML = '<div style="text-align:center;">✨ Be the first mother to leave a message ✨</div>';
      return;
    }

    wallDiv.innerHTML = data.map(row => `
      <div class="card">
        <div class="name">🌸 ${escapeHtml(row.name)}</div>
        <div class="status">💬 ${escapeHtml(row.status)}</div>
        <div class="time">${new Date(row.created_at).toLocaleString()}</div>
      </div>
    `).join('');
  }

  // Post a new message
  async function postMessage() {
    const nameInput = document.getElementById('motherName');
    const msgInput = document.getElementById('motherMessage');
    const name = nameInput.value.trim();
    const status = msgInput.value.trim() || "Feeling blessed 💖";

    if (name.length < 2) {
      alert("Please enter your mother name.");
      return;
    }
    const lowerName = name.toLowerCase();
    if (!lowerName.includes('mama') && !lowerName.includes('mom') && !lowerName.includes('mother')) {
      alert("Only mothers can post. Please include 'mama', 'mom', or 'mother' in your name.");
      return;
    }

    // optional: prevent duplicate today (using localStorage)
    const today = new Date().toDateString();
    if (localStorage.getItem('lastPostDate') === today) {
      alert("You have already posted today. Come back tomorrow to share more 💐");
      return;
    }

    const { error } = await supabase
      .from('mothers')
      .insert([{ name: name, status: status }]);

    if (error) {
      // Show detailed error in both alert and console
      alert(`❌ Something went wrong:\n${error.message}\n\nCheck console for details.`);
      console.error("Supabase insert error:", error);
      return;
    }

    // success
    localStorage.setItem('lastPostDate', today);
    nameInput.value = '';
    msgInput.value = '';
    await loadMessages();
    // make a little floating notification
    const div = document.createElement('div');
    div.innerText = `🌸 ${name} shared a message! 🌸`;
    div.style.position = 'fixed'; div.style.bottom = '20px'; div.style.left = '20px';
    div.style.background = '#d63384'; div.style.color = 'white'; div.style.padding = '6px 16px';
    div.style.borderRadius = '40px'; div.style.zIndex = '9999';
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Real-time listener: new messages appear automatically
  function subscribeToInserts() {
    supabase
      .channel('mothers-wall')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mothers' }, () => {
        loadMessages();
      })
      .subscribe();
  }

  // Initial load
  loadMessages();
  subscribeToInserts();

  document.getElementById('postBtn').addEventListener('click', postMessage);
</script>
</body>
</html>
